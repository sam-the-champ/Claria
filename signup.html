 <!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title> Registration | Claria</title>
<script src="https://kit.fontawesome.com/53b9e1f885.js" crossorigin="anonymous"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#550597",
                        "background-light": "#6d3c94",
                        "background-dark": " #41105e",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display transition-colors duration-300">
<header class="w-full  dark:bg-slate-900  shadow-xl shadow-slate-200/50 border-slate-200 dark:border-slate-800">
<div class="max-w-7xl mx-auto px-6 lg:px-10 py-3 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="size-12 text-primary bg-primary rounded-full">
 <img src="claria-logo-transparent.png" alt="image">
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold tracking-tight">CLARIA</h2>
</div>
<div class="flex items-center gap-6">
<nav class="hidden md:flex items-center gap-8">
<a class="text-slate-00 dark:text-slate-300 text-sm font-medium hover:text-white transition-colors" href="#">Home</a>
<a class="text-slate-00 dark:text-slate-300 text-sm font-medium hover:text-white transition-colors" href="#">Help Center</a>
</nav>
</div>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center py-12 px-6">
<div class="w-full max-w-[520px] flex flex-col items-center">
<div class="mb-8 text-center">
<div class="size-16 text-primary mx-auto mb-4 bg-primary rounded-full flex items-center justify-center">
<img src="claria-logo-transparent.png" alt="image">
</div>
<h1 class="text-slate-900 dark:text-white text-3xl font-bold tracking-tight pb-2">Claria Registration</h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal">Create your account </p>
</div>
<div class="w-full bg-white dark:bg-slate-900 rounded-xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-200 dark:border-slate-800 p-8">
<form class="space-y-5">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">badge</span>
<input class="w-full pl-12 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="John Doe" required="" type="text" id="fullname"/> 
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-5">
<div class="flex flex-col gap-2"> 
<div class="relative"> 
</div>
<span id="student_id_error" class="text-red-500 text-sm  top-full left-4 mt-1"></span>
</div>
<div class="flex flex-col gap-2">
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute  left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="w-full pl-12 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="name@school.edu" required="" type="email" id="email"/> 
</div>
<span id="email_error" class="text-red-500 text-sm relative top-full left-4 mt-1"></span>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Password</label>
<div class="relative"> 
    
<span class="material-symbols-outlined absolute left-38 top-1/2 -translate-y-1/2 text-slate-400 text-xl"><i class="fa-solid fa-eye absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl" id="full_view"></i> <i class="fa-solid fa-eye-slash left-4 relative" style="display: none;" id="slash"></i></span>
<input class="w-full pl-12 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="•••••••• "  required="" type="password" id="password"/> 
</div>
<span id="password_error" class="text-red-500 text-sm relative top-full left-4 mt-1"></span>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Confirm Password</label>
<div class="relative">
 <span class="material-symbols-outlined absolute left-38 top-1/2 -translate-y-1/2 text-slate-400 text-xl"><i class="fa-solid fa-eye fixed left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl" id="full_view_confirm"></i> <i class="fa-solid fa-eye-slash left-4 absolute" style="display: none;" id="slash_confirm"></i></span>
<input class="w-full pl-12 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="••••••••" required="" type="password" id="confirm_password"/><span id="confirm_password_error" class="text-red-500 text-sm absolute top-full left-4 mt-1" ></span>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-all mt-6" type="submit" id="signup_confirm">
<span>Sign Up</span>
<span class="material-symbols-outlined text-lg">person_add</span>
</button>
</form>
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 flex items-center justify-center gap-2 text-slate-400 dark:text-slate-500 text-xs text-center">
<span class="material-symbols-outlined text-sm">security</span>
<span>Your information is protected with industry-standard encryption</span>
</div>
</div>
<p class="mt-8 text-slate-500 dark:text-slate-400 text-sm">
            Already have an account? <a class="text-primary font-semibold hover:underline" href="#"> Login</a>
</p>
</div>
</main>
<footer class="w-full py-8 text-center border- border-slate-200 dark:border-slate-800 bg- dark:bg-slate-900">
<p class="text-slate-00 dark:text-slate-500 text-sm">
        © 2024 School Result Management System. All rights reserved.
    </p>
<div class="flex justify-center gap-4 mt-2">
<a class="text-slate-00 hover:text-primary text-xs transition-colors" href="#">Privacy Policy</a>
<a class="text-slate-00 hover:text-primary text-xs transition-colors" href="#">Terms of Service</a>
</div>
</footer>
<script src=""></script>
</body></html>
